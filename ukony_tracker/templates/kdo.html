{% extends "base.html" %}
{% block title %}Kdo pracuje{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="card login-card">
    <h2>Kdo pracuje?</h2>
    <p class="muted" style="margin: 0 0 var(--sp-4);">Vyber sebe — vše, co přidáš, se zapíše na tebe.</p>
    <form method="post" action="/kdo?next={{ next|urlencode }}">
      <div class="profil-choices">
        {% for p in profily %}
        <button type="submit" name="profil" value="{{ p }}" class="btn btn-primary profil-btn">{{ p }}</button>
        {% endfor %}
      </div>
    </form>
  </div>
</div>
{% endblock %}
