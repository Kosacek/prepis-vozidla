{% extends "base.html" %}
{% block title %}Export — Úkony Tracker{% endblock %}
{% block content %}
<h1 class="page-header">Export</h1>

<div class="card">
  <form method="get" action="/export/excel">
    <div class="fields-row">
      <div class="field">
        <label for="ex-from">Od</label>
        <input type="date" id="ex-from" name="from" value="{{ dfrom }}" required>
      </div>
      <div class="field">
        <label for="ex-to">Do</label>
        <input type="date" id="ex-to" name="to" value="{{ dto }}" required>
      </div>
    </div>

    <div class="field">
      <label>Firmy <span class="muted small">— nic nezaškrtnuto = všechny</span></label>
      <div class="export-firmy">
        {% for f in firmy %}
        <label class="chk"><input type="checkbox" name="firma" value="{{ f.id }}"> {{ f.zkratka }}</label>
        {% else %}
        <span class="muted">Žádné firmy.</span>
        {% endfor %}
      </div>
      {% if firmy %}
      <div class="export-firmy-actions">
        <button type="button" class="btn btn-sm" onclick="exAll(true)">Vybrat vše</button>
        <button type="button" class="btn btn-sm" onclick="exAll(false)">Zrušit výběr</button>
      </div>
      {% endif %}
    </div>

    <div class="export-buttons">
      <button type="submit" class="btn btn-primary">Stáhnout Excel</button>
      <button type="submit" class="btn" formaction="/export/csv">Stáhnout CSV</button>
    </div>
    <p class="muted small" style="margin-top: var(--sp-3);">
      Excel = jeden list na firmu (se součtem). Více firem → více listů.
    </p>
  </form>
</div>

<script>
function exAll(v) {
  document.querySelectorAll('.export-firmy input[type=checkbox]').forEach(function (c) { c.checked = v; });
}
</script>
{% endblock %}
