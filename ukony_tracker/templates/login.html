{% extends "base.html" %}
{% block title %}Přihlášení{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="card login-card">
    <h2>Přihlášení</h2>
    <form method="post">
      <div class="field">
        <label>Heslo</label>
        <input type="password" name="heslo" autofocus autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">Vstoupit</button>
    </form>
  </div>
</div>
{% endblock %}
