# APPEND this block to the shared nginx config at
#   /share/Container/spznaklic/nginx-conf/default.conf
# alongside the existing blocks (wordpress, tr212, hunter, zadosti). Do NOT
# replace or reorder them. Then validate + reload:
#   docker ps --format '{{.Names}}' | grep -i nginx
#   docker exec <nginx-container> nginx -t
#   docker exec <nginx-container> nginx -s reload
# Cloudflare Tunnel: add a Published application route
#   evidence.spznaklic.cz => same origin as hunter/zadosti (the nginx container).
server {
    listen      80;
    listen [::]:80;
    server_name evidence.spznaklic.cz;

    client_max_body_size 10m;

    location / {
        proxy_pass http://ukony-app:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
