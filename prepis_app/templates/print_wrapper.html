<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Tisk žádosti</title>
<style>
  html, body { margin: 0; height: 100%; background: #525659; font-family: system-ui, -apple-system, sans-serif; }
  #bar { position: fixed; top: 0; left: 0; right: 0; height: 46px; background: #1f2937;
         display: flex; align-items: center; gap: 10px; padding: 0 12px; z-index: 10; }
  #bar .hint { color: #cbd5e1; font-size: 13px; margin-right: auto; }
  #bar button { padding: 8px 16px; border: 0; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
  #printBtn { background: #2563eb; color: #fff; }
  #printBtn:hover { background: #1d4ed8; }
  #closeBtn { background: #374151; color: #e5e7eb; }
  #frame { position: absolute; top: 46px; left: 0; right: 0; bottom: 0; width: 100%; border: 0; }
</style>
</head>
<body>
<div id="bar">
  <span class="hint">Uprav co potřebuješ přímo v žádosti, pak dej Vytisknout.</span>
  <button id="printBtn" onclick="doPrint()">🖨️ Vytisknout</button>
  <button id="closeBtn" onclick="window.close()">Zavřít</button>
</div>
<iframe id="frame" src="{{ src }}"></iframe>
<script>
  // The žádost stays a normal, editable PDF in the browser's own viewer. We do
  // NOT auto-open the dialog, so editing the fields works. The Print button
  // prints THIS pdf (with the edits) and, once the dialog is done, closes the
  // tab — the "close after printing" the user liked, without the edit-then-print
  // breakage of the old iframe+auto-close approach.
  var f = document.getElementById('frame'), printed = false, closed = false;
  function closeTab() {
    if (closed) return;
    closed = true;
    setTimeout(function () { try { window.close(); } catch (e) {} }, 400);
  }
  function doPrint() {
    printed = true;
    try { f.contentWindow.focus(); f.contentWindow.print(); }
    catch (e) { try { window.print(); } catch (_) {} }
  }
  // After the dialog closes, focus returns to this tab. Only close if WE printed
  // (so just editing / clicking around never closes it).
  window.addEventListener('focus', function () { if (printed) closeTab(); });
  window.addEventListener('afterprint', closeTab);
</script>
</body>
</html>
