<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Tisk žádosti</title>
<style>
  html, body { margin: 0; height: 100%; background: #525659; }
  #frame { border: 0; width: 100%; height: 100vh; display: block; }
</style>
</head>
<body>
<iframe id="frame" src="/tisk-pdf?files={{ files | urlencode }}"></iframe>
<script>
  // Embed the merged žádost PDF and fire the print dialog as soon as it loads,
  // so the user just presses Enter. When the dialog closes (focus returns here,
  // or afterprint fires) the helper tab closes itself — same flow as the PPD.
  var f = document.getElementById('frame'), printed = false, closed = false;
  function closeTab() {
    if (closed) return;
    closed = true;
    setTimeout(function () { try { window.close(); } catch (e) {} }, 300);
  }
  f.addEventListener('load', function () {
    setTimeout(function () {
      try { f.contentWindow.focus(); f.contentWindow.print(); printed = true; }
      catch (e) { try { window.focus(); window.print(); printed = true; } catch (_) {} }
    }, 500);
  });
  window.addEventListener('afterprint', closeTab);
  window.addEventListener('focus', function () { if (printed) closeTab(); });
</script>
</body>
</html>
