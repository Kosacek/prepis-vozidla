# APPEND this server block to the shared spznaklic nginx config at
#   /share/Container/spznaklic/nginx-conf/default.conf
# alongside the existing blocks (WordPress, tr212, hunter). DO NOT replace
# or reorder them.
#
# Then validate + reload (find the real nginx container name first):
#   docker ps --format '{{.Names}}' | grep -i nginx
#   docker exec <nginx-container> nginx -t
#   docker exec <nginx-container> nginx -s reload
#
# Cloudflare Tunnel side: add a Published application route
#   zadosti.spznaklic.cz  →  same origin as hunter (the nginx container).
# The Host header selects this server block.

server {
    listen      80;
    listen [::]:80;
    server_name zadosti.spznaklic.cz;

    # Scan feature blocks on the Anthropic Vision API (30-45s); allow long
    # upstream responses. Buffering off so the client sees progress.
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Camera photos + plné moci PDF uploads can be several MB each, and
    # /api/scan-all sends multiple images at once.
    client_max_body_size 25m;

    location / {
        proxy_pass http://zadosti-app:8089;
        proxy_http_version 1.1;

        # Cloudflare terminates TLS and forwards X-Forwarded-Proto=https.
        # The Flask app wraps wsgi_app in werkzeug ProxyFix to honor these.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
